<!DOCTYPE html>
<html lang="cs">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>orloj</title>
        <style>
            td {
                background-color: white;
                width: 17px;
                height: 15px;
                text-align: center;
                font-size: 25px;
                user-select: none;
            }
            div {
                display: flex;
                justify-content: center;
                align-items: center;
                position: absolute;
                top: 0;
                left: 0;
                height: 900px;
                width: 900px;
            }
        </style>
    </head>
    <body>
        <svg width="900px" height="900px" style="position:absolute;left:0;top:0">
            <path
                id="path5"
                style="opacity:1;vector-effect:none;stroke:#000000;stroke-width:13.4913;stop-color:#000000;stop-opacity:1"
                d="M 444.7809,6.9867223 C 182.54783,16.196588 62.576618,476.32278 7.6918424,893.25434 H 444.7809 Z m 10.43958,0 V 893.25434 H 892.30785 C 837.42346,476.32278 717.45362,16.196588 455.22048,6.9867223 Z" />
        </svg>
        <div>
            
            <table>
            <tr>
                <td id="0"></td>
                <td id="1"></td>
                <td id="2"></td>
                <td id="3"></td>
                <td id="4"></td>
                <td id="5"></td>
                <td id="6"></td>
                <td id="7"></td>
                <td id="8"></td>
                <td id="9"></td>
                <td id="10"></td>
                <td id="11"></td>
                <td id="12"></td>
                <td id="13"></td>
                <td id="14"></td>
                <td id="15"></td>
                <td id="16"></td>
                <td id="17"></td>
                <td id="18"></td>
                <td id="19"></td>
                <td id="20"></td>
                <td id="21"></td>
                <td id="22"></td>
                <td id="23"></td>
                <td id="24"></td>
                <td id="25"></td>
                <td id="26"></td>
                <td id="27"></td>
                <td id="28"></td>
                <td id="29"></td>
                <td id="30"></td>
                <td id="31"></td>
            </tr>
            </table>
        </div>
        <script>
            carka = 0;
            function move() {
                for (let i = 0; i < 32; i++) {
                    document.getElementById(i).innerHTML = "";
                }

                cas = new Date;
                hodiny = cas.getHours() % 12+12*(cas.getHours()==12);
                minuty = cas.getMinutes();
                carka = Math.floor(32 / 60 * minuty);

                document.getElementById((carka+31)%32).innerHTML = "▮";
                document.getElementById((carka)%32).innerHTML = "▮";

                document.getElementById((carka+15)%32).innerHTML = hodiny>9?"1":"0";
                document.getElementById((carka+16)%32).innerHTML = ("0"+hodiny).slice(-1);

                if ((carka-15)%32 > 0) {
                    document.getElementById((carka+15)%32).innerHTML = ((hodiny+1)%12+12*(hodiny==11))>9?"1":"0";
                    document.getElementById((carka+16)%32).innerHTML = ("0"+((hodiny+1)%12+12*(hodiny==11))).slice(-1);
                }

                setTimeout(move, 10000);
            }
            move();
        </script>
    </body>
</html>
